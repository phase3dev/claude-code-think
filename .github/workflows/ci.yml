name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bash syntax check (bash -n)
        run: bash -n launcher/claudemax patch-extension.sh test-thinking-display.sh

      - name: ShellCheck
        # ubuntu-latest ships shellcheck. Gate at warning severity: the only
        # findings are info-level SC2015 (A && B || C) notes in the launchers,
        # where the C branch firing is the intended best-effort behavior.
        run: shellcheck --severity=warning launcher/claudemax patch-extension.sh test-thinking-display.sh

      - name: Node syntax check (node --check)
        run: |
          for f in launcher/claudemax.win.js proxy.js; do
            node --check "$f"
          done

      - name: Python compile
        run: python3 -m py_compile fix-context-icon.py tests/test_regressions.py

      - name: Regression tests
        run: python3 -m unittest discover -s tests -v
